name: qemu-minimal-smoke-test

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
    - 'qemu/*-vm'

jobs:

  smoke-test-x86:
    name: smoke-test-x86
    runs-on: ubuntu-latest
    steps:
    - name: Check out code using action/checkout
      uses: actions/checkout@v4.2.2
    - name: Install a couple of packages via the apt package manager
      run: |
        sudo apt update
        sudo apt install -y qemu-system-x86 qemu-utils cloud-image-utils
    - name: Generate an ssh key-pair for this test
      run: ssh-keygen -t rsa -q -f "$HOME/.ssh/id_rsa" -N ""
    - name: Generate a x86_64 qemu-based ./gen-vm smoke-test
      run: ./gen-vm
      working-directory: qemu
      env:
        VM_NAME: qemu-minimal-smoke-test
        KVM: none
        USERNAME: ubuntu
        PASS: password
    - name: Test RESTORE_IMAGE mode
      run: |
        # Remove the main image to simulate corruption/deletion
        rm -f ../images/qemu-minimal-smoke-test.qcow2
        # Verify it was removed
        if [ -f ../images/qemu-minimal-smoke-test.qcow2 ]; then
          echo "Failed to remove image for test"
          exit 1
        fi
        # Restore from backing file using RESTORE_IMAGE mode
        VM_NAME=qemu-minimal-smoke-test \
          RESTORE_IMAGE=true \
          ./gen-vm
        # Verify the image was recreated with backing file
        if [ ! -f ../images/qemu-minimal-smoke-test.qcow2 ]; then
          echo "Image not restored from backing"
          exit 1
        fi
        if ! qemu-img info ../images/qemu-minimal-smoke-test.qcow2 \
             | grep -q "backing file:"; then
          echo "Restored image does not have backing file"
          exit 1
        fi
        echo "✓ RESTORE_IMAGE mode test passed"
      working-directory: qemu
    - name: Run the generated x86_64 VM as a background task
      run: ./run-vm > run-vm-output.log 2>&1 &
      working-directory: qemu
      env:
        VM_NAME: qemu-minimal-smoke-test
        KVM: none
        NVME: 4
    - name: Wait for VM to boot (smart polling with 60s timeout)
      run: |
        echo "Waiting for VM to boot and accept SSH connections..."
        timeout=60
        elapsed=0
        while [ $elapsed -lt $timeout ]; do
          if ssh -o ConnectTimeout=1 \
                 -o NoHostAuthenticationForLocalhost=yes \
                 -o StrictHostKeyChecking=no \
                 -p 2222 ubuntu@localhost true 2>/dev/null; then
            echo "✓ VM ready after $elapsed seconds"
            exit 0
          fi
          sleep 2
          elapsed=$((elapsed + 2))
        done
        echo "✗ VM failed to boot within $timeout seconds"
        exit 1
    - name: Output run-vm command output
      run: |
        cat qemu/run-vm-output.log
    - name: Make sure we can ssh into running VM
      run: |
        ssh -o NoHostAuthenticationForLocalhost=yes \
          -v -p 2222 ubuntu@localhost ls -ltrh

  dry-run-tests:
    name: dry-run-tests
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v4.2.2
    - name: Install qemu-utils (needed by nvme_create)
      run: |
        sudo apt update
        sudo apt install -y qemu-utils
    - name: Create images directory
      run: mkdir -p images

    - name: "Dry-run: x86 defaults (NVME=none)"
      run: |
        out=$(VM_NAME=dry-test KVM=none NVME=none \
              DRY_RUN=1 ./run-vm)
        echo "$out"
        echo "$out" | grep -q "qemu-system-x86_64"
        echo "$out" | grep -q "\-machine q35"
        echo "$out" | grep -q "\-cpu EPYC"
        echo "$out" | grep -q "\-nographic"
        echo "✓ x86 defaults passed"
      working-directory: qemu

    - name: "Dry-run: x86 with NVME=2"
      run: |
        out=$(VM_NAME=dry-test KVM=none NVME=2 \
              DRY_RUN=1 ./run-vm)
        echo "$out"
        echo "$out" | grep -q "nvme,serial=dry-test-nvme1"
        echo "$out" | grep -q "nvme,serial=dry-test-nvme2"
        echo "✓ x86 NVME=2 passed"
      working-directory: qemu

    - name: "Dry-run: x86 with NVME=custom string"
      run: |
        custom="-device nvme,serial=custom-test"
        out=$(VM_NAME=dry-test KVM=none \
              NVME="${custom}" DRY_RUN=1 ./run-vm)
        echo "$out"
        echo "$out" | grep -q "serial=custom-test"
        echo "✓ x86 NVME=custom passed"
      working-directory: qemu

    - name: "Dry-run: arm64 defaults"
      run: |
        out=$(VM_NAME=dry-test KVM=none ARCH=arm64 \
              DRY_RUN=1 ./run-vm)
        echo "$out"
        echo "$out" | grep -q "qemu-system-aarch64"
        echo "$out" | grep -q "\-machine virt"
        echo "✓ arm64 defaults passed"
      working-directory: qemu

    - name: "Dry-run: riscv64 defaults"
      run: |
        out=$(VM_NAME=dry-test KVM=none ARCH=riscv64 \
              DRY_RUN=1 ./run-vm)
        echo "$out"
        echo "$out" | grep -q "qemu-system-riscv64"
        echo "$out" | grep -q "\-machine virt"
        echo "✓ riscv64 defaults passed"
      working-directory: qemu

    - name: "Dry-run: custom VCPUS and VMEM"
      run: |
        out=$(VM_NAME=dry-test KVM=none VCPUS=8 \
              VMEM=16384 DRY_RUN=1 ./run-vm)
        echo "$out"
        echo "$out" | grep -q "\-smp cpus=8"
        echo "$out" | grep -q "\-m 16384"
        echo "✓ custom VCPUS/VMEM passed"
      working-directory: qemu

  smoke-test-arm64:
    name: smoke-test-arm64
    runs-on: ubuntu-latest
    steps:
    - name: Check out code using action/checkout
      uses: actions/checkout@v4.2.2
    - name: Install a couple of packages via the apt package manager
      run: |
        sudo apt update
        sudo apt install -y qemu-system-arm cloud-image-utils
    - name: Generate an ssh key-pair for this test
      run: ssh-keygen -t rsa -q -f "$HOME/.ssh/id_rsa" -N ""
    - name: Run a aarch64 qemu-based ./gen-vm smoke-test
      run: ./gen-vm
      working-directory: qemu
      env:
        VM_NAME: qemu-minimal-smoke-test-arm64
        KVM: none
        USERNAME: ubuntu
        PASS: password
        ARCH: arm64

  smoke-test-riscv64:
    name: smoke-test-riscv64
    runs-on: ubuntu-latest
    steps:
    - name: Check out code using action/checkout
      uses: actions/checkout@v4.2.2
    - name: Install a couple of packages via the apt package manager
      run: sudo apt update && sudo apt install -y qemu-system-misc u-boot-qemu cloud-image-utils
    - name: Generate an ssh key-pair for this test
      run: ssh-keygen -t rsa -q -f "$HOME/.ssh/id_rsa" -N ""
    - name: Run a riscv64 qemu-based ./gen-vm smoke-test
      run: ./gen-vm
      working-directory: qemu
      env:
        VM_NAME: qemu-minimal-smoke-test-riscv64
        KVM: none
        USERNAME: ubuntu
        PASS: password
        ARCH: riscv64
