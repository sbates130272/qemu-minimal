name: qemu-minimal-smoke-test

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
    - 'qemu/*-vm'
    - '.github/workflows/smoke-test.yml'

jobs:

  smoke-test-x86:
    name: smoke-test-x86
    runs-on: ubuntu-latest
    steps:
    - name: Check out code using action/checkout
      uses: actions/checkout@v4.3.1
    - name: Install packages (cached)
      uses: awalsh128/cache-apt-pkgs-action@v1
      with:
        packages: >-
          qemu-system-x86 qemu-utils cloud-image-utils
    - name: Generate an ssh key-pair for this test
      run: ssh-keygen -t rsa -q -f "$HOME/.ssh/id_rsa" -N ""
    - name: Cache cloud image
      uses: actions/cache@v4
      with:
        path: images/*-server-cloudimg-*.img
        key: cloud-img-amd64-noble
    - name: Ensure images directory exists
      run: mkdir -p images
    - name: Generate a x86_64 qemu-based ./gen-vm smoke-test
      run: ./gen-vm
      working-directory: qemu
      env:
        VM_NAME: qemu-minimal-smoke-test
        KVM: none
        USERNAME: ubuntu
        PASS: password
        PACKAGES: none
        SIZE: 8
    - name: Test RESTORE_IMAGE mode
      run: |
        # Remove the main image to simulate corruption/deletion
        rm -f ../images/qemu-minimal-smoke-test.qcow2
        # Verify it was removed
        if [ -f ../images/qemu-minimal-smoke-test.qcow2 ]; then
          echo "Failed to remove image for test"
          exit 1
        fi
        # Restore from backing file using RESTORE_IMAGE mode
        VM_NAME=qemu-minimal-smoke-test \
          RESTORE_IMAGE=true \
          ./gen-vm
        # Verify the image was recreated with backing file
        if [ ! -f ../images/qemu-minimal-smoke-test.qcow2 ]; then
          echo "Image not restored from backing"
          exit 1
        fi
        if ! qemu-img info ../images/qemu-minimal-smoke-test.qcow2 \
             | grep -q "backing file:"; then
          echo "Restored image does not have backing file"
          exit 1
        fi
        echo "✓ RESTORE_IMAGE mode test passed"
      working-directory: qemu
    - name: Run the generated x86_64 VM as a background task
      run: ./run-vm > run-vm-output.log 2>&1 &
      working-directory: qemu
      env:
        VM_NAME: qemu-minimal-smoke-test
        KVM: none
        NVME: 1
    - name: Wait for VM to boot (smart polling with 180s timeout)
      run: |
        echo "Waiting for VM to boot and accept SSH connections..."
        timeout=180
        elapsed=0
        while [ $elapsed -lt $timeout ]; do
          if ssh -o ConnectTimeout=1 \
                 -o NoHostAuthenticationForLocalhost=yes \
                 -o StrictHostKeyChecking=no \
                 -p 2222 ubuntu@localhost true 2>/dev/null; then
            echo "✓ VM ready after $elapsed seconds"
            exit 0
          fi
          sleep 2
          elapsed=$((elapsed + 2))
        done
        echo "✗ VM failed to boot within $timeout seconds"
        exit 1
    - name: Output run-vm command output
      if: always()
      run: |
        cat qemu/run-vm-output.log
    - name: Make sure we can ssh into running VM
      run: |
        ssh -o NoHostAuthenticationForLocalhost=yes \
          -v -p 2222 ubuntu@localhost ls -ltrh

  smoke-test-x86-nullblk:
    name: smoke-test-x86-nullblk
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v4.3.1
    - name: Install packages (cached)
      uses: awalsh128/cache-apt-pkgs-action@v1
      with:
        packages: >-
          qemu-system-x86 qemu-utils cloud-image-utils
    - name: Generate SSH key-pair
      run: >-
        ssh-keygen -t rsa -q
        -f "$HOME/.ssh/id_rsa" -N ""
    - name: Cache cloud image
      uses: actions/cache@v4
      with:
        path: images/*-server-cloudimg-*.img
        key: cloud-img-amd64-noble
    - name: Ensure images directory exists
      run: mkdir -p images
    - name: Generate x86_64 VM image
      run: ./gen-vm
      working-directory: qemu
      env:
        VM_NAME: nullblk-smoke-test
        KVM: none
        USERNAME: ubuntu
        PASS: password
        PACKAGES: none
        SIZE: 8
    - name: Try to load null_blk kernel module
      id: nullblk
      run: |
        # Azure kernels may not ship null_blk even in
        # linux-modules-extra; install it and try modprobe.
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          linux-modules-extra-$(uname -r) || true
        if sudo modprobe null_blk nr_devices=2 \
             queue_mode=2 gb=1024 2>/dev/null; then
          ls -la /dev/nullb*
          echo "has_nullblk=true" >> "$GITHUB_OUTPUT"
          echo "✓ null_blk loaded with 2 devices"
        else
          echo "has_nullblk=false" >> "$GITHUB_OUTPUT"
          echo "⚠ null_blk not available on this" \
            "kernel ($(uname -r)); skipping live test"
        fi
    - name: Boot VM with NVME=-2
      if: steps.nullblk.outputs.has_nullblk == 'true'
      run: ./run-vm > run-vm-output.log 2>&1 &
      working-directory: qemu
      env:
        VM_NAME: nullblk-smoke-test
        KVM: none
        NVME: -2
    - name: Wait for VM to boot (180s timeout)
      if: steps.nullblk.outputs.has_nullblk == 'true'
      run: |
        echo "Waiting for VM to boot..."
        timeout=180
        elapsed=0
        while [ $elapsed -lt $timeout ]; do
          if ssh -o ConnectTimeout=1 \
                 -o NoHostAuthenticationForLocalhost=yes \
                 -o StrictHostKeyChecking=no \
                 -p 2222 ubuntu@localhost \
                 true 2>/dev/null; then
            echo "✓ VM ready after $elapsed seconds"
            exit 0
          fi
          sleep 2
          elapsed=$((elapsed + 2))
        done
        echo "✗ VM failed to boot within ${timeout}s"
        exit 1
    - name: Output run-vm log
      if: >-
        always() &&
        steps.nullblk.outputs.has_nullblk == 'true'
      run: cat qemu/run-vm-output.log
    - name: Verify NVMe devices visible in guest
      if: steps.nullblk.outputs.has_nullblk == 'true'
      run: |
        ssh -o NoHostAuthenticationForLocalhost=yes \
          -o StrictHostKeyChecking=no \
          -p 2222 ubuntu@localhost \
          "lsblk | grep nvme && \
           echo '✓ NVMe devices visible in guest'"

  dry-run-tests:
    name: dry-run-tests
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v4.3.1
    - name: Install qemu-utils (cached)
      uses: awalsh128/cache-apt-pkgs-action@v1
      with:
        packages: qemu-utils
    - name: Create images directory
      run: mkdir -p images

    - name: "Dry-run: x86 defaults (NVME=none)"
      run: |
        out=$(VM_NAME=dry-test KVM=none NVME=none \
              DRY_RUN=1 ./run-vm)
        echo "$out"
        echo "$out" | grep -q "qemu-system-x86_64"
        echo "$out" | grep -q "\-machine q35"
        echo "$out" | grep -q "\-cpu EPYC"
        echo "$out" | grep -q "\-nographic"
        echo "✓ x86 defaults passed"
      working-directory: qemu

    - name: "Dry-run: x86 with NVME=2"
      run: |
        out=$(VM_NAME=dry-test KVM=none NVME=2 \
              DRY_RUN=1 ./run-vm)
        echo "$out"
        echo "$out" | grep -q "nvme,serial=dry-test-nvme1"
        echo "$out" | grep -q "nvme,serial=dry-test-nvme2"
        echo "✓ x86 NVME=2 passed"
      working-directory: qemu

    - name: "Dry-run: PCI_MMIO_BRIDGE unsupported QEMU fails"
      run: |
        mkdir -p ../fake-qemu-no-bridge
        cat > ../fake-qemu-no-bridge/qemu-system-x86_64 << 'EOF'
        #!/bin/sh
        if [ "$1" = "-device" ] && [ "$2" = "help" ]; then
          echo 'name "virtio-net-pci", bus PCI'
          exit 0
        fi
        if [ "$1" = "-device" ] && [ "$2" = "nvme,help" ]; then
          echo "ioeventfd=<bool>"
          echo "dbcs=<bool>"
          exit 0
        fi
        if [ "$1" = "-device" ] && [ "$2" = "nvme-ns,help" ]; then
          echo "lbaf-mask=<uint16>"
          exit 0
        fi
        exit 0
        EOF
        chmod +x ../fake-qemu-no-bridge/qemu-system-x86_64
        set +e
        out=$(VM_NAME=dry-test KVM=none NVME=none PCI_MMIO_BRIDGE=on \
              QEMU_PATH=../fake-qemu-no-bridge/ DRY_RUN=1 ./run-vm 2>&1)
        rc=$?
        set -e
        echo "$out"
        [ $rc -ne 0 ] || \
          (echo "Expected run-vm to fail without pci-mmio-bridge" && exit 1)
        echo "$out" | grep -q "does not support 'pci-mmio-bridge'"
        echo "✓ unsupported pci-mmio-bridge check passed"
      working-directory: qemu

    - name: "Dry-run: PCI_MMIO_BRIDGE supported QEMU succeeds"
      run: |
        mkdir -p ../fake-qemu-with-bridge
        cat > ../fake-qemu-with-bridge/qemu-system-x86_64 << 'EOF'
        #!/bin/sh
        if [ "$1" = "-device" ] && [ "$2" = "help" ]; then
          echo 'name "pci-mmio-bridge", bus PCI'
          exit 0
        fi
        if [ "$1" = "-device" ] && [ "$2" = "nvme,help" ]; then
          echo "ioeventfd=<bool>"
          echo "dbcs=<bool>"
          exit 0
        fi
        if [ "$1" = "-device" ] && [ "$2" = "nvme-ns,help" ]; then
          echo "lbaf-mask=<uint16>"
          exit 0
        fi
        exit 0
        EOF
        chmod +x ../fake-qemu-with-bridge/qemu-system-x86_64
        out=$(VM_NAME=dry-test KVM=none NVME=none PCI_MMIO_BRIDGE=on \
              QEMU_PATH=../fake-qemu-with-bridge/ DRY_RUN=1 ./run-vm)
        echo "$out"
        echo "$out" | grep -q "pci-mmio-bridge,id=mmio-bridge"
        echo "✓ supported pci-mmio-bridge check passed"
      working-directory: qemu

    - name: "Dry-run: x86 with NVME=2 and NVME_RECREATE=true"
      run: |
        VM_NAME=dry-test KVM=none NVME=2 DRY_RUN=1 ./run-vm > /dev/null
        [ -f ../images/dry-test-nvme1.qcow2 ] || \
          (echo "Missing nvme1 backing before recreate" && exit 1)
        mtime1=$(stat -c %Y ../images/dry-test-nvme1.qcow2)
        mtime2=$(stat -c %Y ../images/dry-test-nvme2.qcow2)
        sleep 2
        out=$(VM_NAME=dry-test KVM=none NVME=2 NVME_RECREATE=true \
              DRY_RUN=1 ./run-vm)
        echo "$out"
        echo "$out" | grep -q "nvme,serial=dry-test-nvme1"
        echo "$out" | grep -q "nvme,serial=dry-test-nvme2"
        [ -f ../images/dry-test-nvme1.qcow2 ] || \
          (echo "Missing nvme1 after NVME_RECREATE" && exit 1)
        [ -f ../images/dry-test-nvme2.qcow2 ] || \
          (echo "Missing nvme2 after NVME_RECREATE" && exit 1)
        [ "$(stat -c %Y ../images/dry-test-nvme1.qcow2)" -gt "$mtime1" ] || \
          (echo "nvme1 mtime unchanged; file not recreated" && exit 1)
        [ "$(stat -c %Y ../images/dry-test-nvme2.qcow2)" -gt "$mtime2" ] || \
          (echo "nvme2 mtime unchanged; file not recreated" && exit 1)
        echo "✓ NVME_RECREATE passed"
      working-directory: qemu

    - name: "Dry-run: x86 with NVME=custom string"
      run: |
        custom="-device nvme,serial=custom-test"
        out=$(VM_NAME=dry-test KVM=none \
              NVME="${custom}" DRY_RUN=1 ./run-vm)
        echo "$out"
        echo "$out" | grep -q "serial=custom-test"
        echo "✓ x86 NVME=custom passed"
      working-directory: qemu

    - name: "Dry-run: x86 with NVME=-2 (null_blk)"
      run: |
        out=$(VM_NAME=dry-test KVM=none NVME=-2 \
              DRY_RUN=1 ./run-vm)
        echo "$out"
        echo "$out" | grep -q "/dev/nullb0"
        echo "$out" | grep -q "/dev/nullb1"
        echo "$out" | grep -q \
          "nvme,serial=dry-test-nvme0"
        echo "$out" | grep -q \
          "nvme,serial=dry-test-nvme1"
        echo "✓ x86 NVME=-2 passed"
      working-directory: qemu

    - name: "Dry-run: arm64 defaults"
      run: |
        out=$(VM_NAME=dry-test KVM=none ARCH=arm64 \
              DRY_RUN=1 ./run-vm)
        echo "$out"
        echo "$out" | grep -q "qemu-system-aarch64"
        echo "$out" | grep -q "\-machine virt"
        echo "✓ arm64 defaults passed"
      working-directory: qemu

    - name: "Dry-run: riscv64 defaults"
      run: |
        out=$(VM_NAME=dry-test KVM=none ARCH=riscv64 \
              DRY_RUN=1 ./run-vm)
        echo "$out"
        echo "$out" | grep -q "qemu-system-riscv64"
        echo "$out" | grep -q "\-machine virt"
        echo "✓ riscv64 defaults passed"
      working-directory: qemu

    - name: "Dry-run: custom VCPUS and VMEM"
      run: |
        out=$(VM_NAME=dry-test KVM=none VCPUS=8 \
              VMEM=16384 DRY_RUN=1 ./run-vm)
        echo "$out"
        echo "$out" | grep -q "\-smp cpus=8"
        echo "$out" | grep -q "\-m 16384"
        echo "✓ custom VCPUS/VMEM passed"
      working-directory: qemu

  smoke-test-arm64:
    name: smoke-test-arm64
    runs-on: ubuntu-latest
    steps:
    - name: Check out code using action/checkout
      uses: actions/checkout@v4.3.1
    - name: Install packages (cached)
      uses: awalsh128/cache-apt-pkgs-action@v1
      with:
        packages: qemu-system-arm cloud-image-utils
    - name: Generate an ssh key-pair for this test
      run: ssh-keygen -t rsa -q -f "$HOME/.ssh/id_rsa" -N ""
    - name: Cache cloud image
      uses: actions/cache@v4
      with:
        path: images
        key: cloud-img-arm64-noble
    - name: Ensure images directory exists
      run: mkdir -p images
    - name: Run a aarch64 qemu-based ./gen-vm smoke-test
      run: ./gen-vm
      working-directory: qemu
      env:
        VM_NAME: qemu-minimal-smoke-test-arm64
        KVM: none
        USERNAME: ubuntu
        PASS: password
        ARCH: arm64
        PACKAGES: none
        SIZE: 8

  smoke-test-riscv64:
    name: smoke-test-riscv64
    runs-on: ubuntu-latest
    steps:
    - name: Check out code using action/checkout
      uses: actions/checkout@v4.3.1
    - name: Install packages (cached)
      uses: awalsh128/cache-apt-pkgs-action@v1
      with:
        packages: >-
          qemu-system-misc u-boot-qemu cloud-image-utils
    - name: Generate an ssh key-pair for this test
      run: ssh-keygen -t rsa -q -f "$HOME/.ssh/id_rsa" -N ""
    - name: Cache cloud image
      uses: actions/cache@v4
      with:
        path: images
        key: cloud-img-riscv64-noble
    - name: Ensure images directory exists
      run: mkdir -p images
    - name: Run a riscv64 qemu-based ./gen-vm smoke-test
      run: ./gen-vm
      working-directory: qemu
      env:
        VM_NAME: qemu-minimal-smoke-test-riscv64
        KVM: none
        USERNAME: ubuntu
        PASS: password
        ARCH: riscv64
        PACKAGES: none
        SIZE: 8
